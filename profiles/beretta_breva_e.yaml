# ==========================================================
# Beretta Breva E Version: 1.0.0 RC2
# Profilo Tuya Local per Home Assistant 2026+
#
# Modello: Beretta Breva (Haier OEM)
# Product ID: 9xvzf8c0bg33eenj
# Model ID: 61ABRAOEBT
#
# Profilo pulito: rimosse funzioni non presenti sul modello
# (EcoPilot, Heat, Aria esterna, Problem DP116, Automatico orizzontale)
# ==========================================================

name: Beretta Breva E
products:
  - id: 9xvzf8c0bg33eenj
    manufacturer: Beretta
    model: Breva Dual Split 9000+9000
    model_id: 61ABRAOEBT
entities:

  #########################################################
  # Profile notes
  #
  # Verified against real device.
  # Functional behavior unchanged.
  #########################################################

  #########################################################
  # PRIMARY CLIMATE ENTITY
  #########################################################
  - entity: climate
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: mode
            conditions:
              - dps_val: auto
                value: heat_cool
              - dps_val: cold
                value: cool
              - dps_val: wet
                value: dry
              - dps_val: hot
                value: heat
              - dps_val: wind
                value: fan_only
      - id: 2
        type: integer
        name: temperature
        range:
          min: 16
          max: 30
        mapping:
          - constraint: temperature_unit
            conditions:
              - dps_val: f
                range:
                  min: 64
                  max: 86
                value_redirect: temp_set_f
      - id: 3
        type: integer
        name: current_temperature
        mapping:
          - scale: 2
            constraint: temperature_unit
            conditions:
              - dps_val: f
                scale: 1
                value_redirect: temp_current_f
      - id: 4
        type: string
        name: mode
        hidden: true
      - id: 5
        type: string
        name: fan_mode
        mapping:
          - dps_val: auto
            value: auto
          - dps_val: low
            value: low
          - dps_val: mid
            value: medium
          - dps_val: high
            value: high
      - id: 8
        type: boolean
        name: preset_mode
        mapping:
          - dps_val: true
            value: "Eco"
          - dps_val: false
            value: "Comfort"
      - id: 18
        type: integer
        name: current_humidity
      - id: 19
        type: string
        name: temperature_unit
        mapping:
          - dps_val: c
            value: C
          - dps_val: f
            value: F
      - id: 23
        type: integer
        name: temp_current_f
        optional: true
        hidden: true
      - id: 24
        type: integer
        name: temp_set_f
        range:
          min: 64
          max: 86
        optional: true
        hidden: true
        # Undocumented but in log
  - entity: sensor
    name: Temperatura esterna
    category: diagnostic
    dps:
      - id: 128
        type: integer
        name: sensor

  - entity: sensor
    name: Consumo energetico
    category: diagnostic
    dps:
      - id: 112
        type: integer
        name: sensor
        optional: true

  - entity: light
    translation_key: display
    category: config
    dps:
      - id: 13
        type: boolean
        name: switch
  - entity: switch
    name: Segnale acustico
    category: config
    icon: "mdi:volume-high"
    dps:
      - id: 16
        type: boolean
        name: switch
        optional: true
  - entity: select
    translation_key: temperature_unit
    category: config
    dps:
      - id: 19
        type: string
        name: option
        mapping:
          - dps_val: c
            value: celsius
          - dps_val: f
            value: fahrenheit
  - entity: switch
    name: Silenzioso
    category: config
    icon: "mdi:music-off"
    dps:
      - id: 108
        type: boolean
        name: switch
  # Boolean dps 16 = Segnale acustico and 109 = Sleep documented but missing from log
  - entity: switch
    translation_key: sleep
    category: config
    dps:
      - id: 109
        type: boolean
        name: switch
        optional: true

  - entity: switch
    name: Turbo
    category: config
    icon: "mdi:rocket-launch"
    dps:
      - id: 107
        type: boolean
        name: switch
        optional: true
  - entity: switch
    name: Pulizia automatica
    category: config
    icon: "mdi:spray-bottle"
    dps:
      - id: 114
        type: boolean
        name: switch
        optional: true
  - entity: switch
    name: Sterilizzazione 56°C
    category: config
    icon: "mdi:heat-wave"
    dps:
      - id: 119
        type: boolean
        name: switch
        optional: true
  - entity: switch
    name: Antigelo 10 °C
    category: config
    icon: "mdi:snowflake-alert"
    dps:
      - id: 110
        type: boolean
        name: switch
        optional: true
  - entity: select
    name: Oscillazione verticale
    category: config
    icon: "mdi:arrow-up-down-bold"
    dps:
      - id: 117
        type: string
        name: option
        mapping:
          - dps_val: ud_00
            value: Alto
          - dps_val: ud_01
            value: Alto intermedio
          - dps_val: ud_02
            value: Centrale
          - dps_val: ud_03
            value: Basso intermedio
          - dps_val: ud_04
            value: Basso
          - dps_val: ud_0c
            value: Automatico
